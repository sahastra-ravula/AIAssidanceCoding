<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SR University - Technical Fest Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        input.error,
        select.error {
            border-color: #e74c3c;
            background-color: #fadbd8;
        }

        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .success-message.show {
            display: block;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Technical Fest Registration</h1>
        <p class="subtitle">SR University</p>

        <div class="success-message" id="successMessage">
            ✓ Registration submitted successfully!
        </div>

        <form id="registrationForm" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label for="name">Name *</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                <div class="error-message" id="nameError"></div>
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number *</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter 10-digit phone number" required>
                <div class="error-message" id="phoneError"></div>
            </div>

            <div class="form-group">
                <label for="department">Department *</label>
                <select id="department" name="department" required>
                    <option value="">Select your department</option>
                    <option value="CSE">Computer Science Engineering</option>
                    <option value="ECE">Electronics & Communication</option>
                    <option value="ME">Mechanical Engineering</option>
                    <option value="CE">Civil Engineering</option>
                    <option value="EEE">Electrical Engineering</option>
                </select>
                <div class="error-message" id="departmentError"></div>
            </div>

            <div class="form-group">
                <label for="event">Event Selection *</label>
                <select id="event" name="event" required>
                    <option value="">Select an event</option>
                    <option value="coding">Coding Competition</option>
                    <option value="robotics">Robotics Challenge</option>
                    <option value="webdev">Web Development</option>
                    <option value="ai">AI & Machine Learning</option>
                    <option value="iot">IoT Innovation</option>
                </select>
                <div class="error-message" id="eventError"></div>
            </div>

            <button type="submit">Register Now</button>
        </form>
    </div>

    <script>
        function validateName(name) {
            return name.trim().length > 0;
        }

        function validateEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        function validatePhone(phone) {
            const phoneRegex = /^\d{10}$/;
            return phoneRegex.test(phone.replace(/\D/g, ''));
        }

        function clearError(fieldId) {
            const field = document.getElementById(fieldId);
            const errorMsg = document.getElementById(fieldId + 'Error');
            field.classList.remove('error');
            errorMsg.classList.remove('show');
        }

        function showError(fieldId, message) {
            const field = document.getElementById(fieldId);
            const errorMsg = document.getElementById(fieldId + 'Error');
            field.classList.add('error');
            errorMsg.textContent = message;
            errorMsg.classList.add('show');
        }

        function handleSubmit(event) {
            event.preventDefault();

            let isValid = true;

            // Validate Name
            const name = document.getElementById('name').value;
            if (!validateName(name)) {
                showError('name', 'Name is required');
                isValid = false;
            } else {
                clearError('name');
            }

            // Validate Email
            const email = document.getElementById('email').value;
            if (!email) {
                showError('email', 'Email is required');
                isValid = false;
            } else if (!validateEmail(email)) {
                showError('email', 'Please enter a valid email address');
                isValid = false;
            } else {
                clearError('email');
            }

            // Validate Phone
            const phone = document.getElementById('phone').value;
            if (!phone) {
                showError('phone', 'Phone number is required');
                isValid = false;
            } else if (!validatePhone(phone)) {
                showError('phone', 'Phone number must be 10 digits');
                isValid = false;
            } else {
                clearError('phone');
            }

            // Validate Department
            const department = document.getElementById('department').value;
            if (!department) {
                showError('department', 'Please select a department');
                isValid = false;
            } else {
                clearError('department');
            }

            // Validate Event
            const event = document.getElementById('event').value;
            if (!event) {
                showError('event', 'Please select an event');
                isValid = false;
            } else {
                clearError('event');
            }

            if (isValid) {
                document.getElementById('successMessage').classList.add('show');
                document.getElementById('registrationForm').reset();
                setTimeout(() => {
                    document.getElementById('successMessage').classList.remove('show');
                }, 3000);
            }
        }
    </script>
</body>

</html>
